<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hizalanmış Saat ve Günler</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/seven-segment');

        body {
            background-color: #ffffff; /* Sayfa arka planını koyu yapalım ki tasarım öne çıksın */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* Ana Panel: Görselin boyutuyla sabitliyoruz */
        .main-panel {
            position: relative;
            width: 800px;
            height: 800px;
            background-image: url('g3086.png');
            background-size: 100% 100%; /* Görseli tam sığdır */
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Üstteki 7 Gün Şekilleri - Konumu resme göre ayarlandı */
        .days-container {
            position: absolute;
            top: 598px; /* Dikey hizayı buradan milimetrik değiştirebilirsin */
            left: 50.3%; /* Yatay merkezden hafif kaydırma gerekebilir */
            transform: translateX(-50%);
            display: flex;
            gap: 13.5px; /* Pencereler arası boşluk */
        }

        .item-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 38px; /* Pencere genişliği */
        }

        .color-picker {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
        }

        /* Çizdiğin pencerelerin tam üstüne gelecek parlayan kutu */
        .shape {
            width: 34px; 
            height: 52px;
            border: 2px solid transparent;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            transition: all 0.3s ease;
        }

        .label {
            font-size: 12px;
            font-weight: bold;
            margin-top: 4px;
            color: transparent; /* Görseldeki yazıların üzerine parıltı verir */
            transition: all 0.3s ease;
            text-align: center;
        }

        /* Dijital Saat Alanı - 88:88'in tam üzerine */
        .clock-wrapper {
            position: absolute;
            top: 732px; /* Dikey hiza */
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            text-align: center;
        }

        .digital-clock {
            font-family: 'Seven Segment', sans-serif;
            font-size: 105px; /* Boyutu resimdeki boşluğa göre ayarlandı */
            color: rgba(255, 255, 255, 0.05); /* Kapalıyken hafif görünürlük */
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 2px;
        }

        /* Gizli Renk Seçici (Saatin üzerinde tıklandığında çalışır) */
        .clock-wrapper .color-picker {
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <div class="main-panel">
        
        <div class="days-container">
            <script>
                const gunler = ["PTS", "SAL", "ÇAR", "PER", "CUM", "CTS", "PAZ"];
                for (let i = 0; i < 7; i++) {
                    document.write(`
                        <div class="item-container">
                            <input type="color" class="color-picker" oninput="updateItem(this)">
                            <div class="shape"></div>
                            <div class="label">${gunler[i]}</div>
                        </div>
                    `);
                }
            </script>
        </div>

        <div class="clock-wrapper">
            <input type="color" class="color-picker" oninput="updateClock(this.value)">
            <div id="mainClock" class="digital-clock">00:00</div>
        </div>

    </div>

    <script>
        // Günleri güncelleme (Parlayan efekt)
        function updateItem(picker) {
            const color = picker.value;
            const container = picker.parentElement;
            const shape = container.querySelector('.shape');
            const label = container.querySelector('.label');

            shape.style.borderColor = color;
            shape.style.backgroundColor = color + "33"; // %20 doluluk
            shape.style.boxShadow = `0 0 15px ${color}, inset 0 0 8px ${color}`;
            
            label.style.color = color;
            label.style.textShadow = `0 0 8px ${color}`;
        }

        // Saati güncelleme (Renk ve parlama)
        function updateClock(color) {
            const clock = document.getElementById('mainClock');
            clock.style.color = color;
            clock.style.textShadow = `0 0 30px ${color}, 0 0 5px ${color}`;
        }

        // Gerçek zamanlı saat fonksiyonu
        function runClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('mainClock').innerText = `${hours}:${mins}`;
        }

        setInterval(runClock, 1000);
        runClock();
    </script>
</body>
</html>
