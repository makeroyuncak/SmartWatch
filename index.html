<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.cdnfonts.com/css/seven-segment');

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }

        /* Ana Panel (Görseli Arka Plan Yapar) */
        .main-panel {
            position: relative;
            width: 800px;
            height: 800px;
            background-image: url('g3086.png'); /* Görsel dosya adınızla eşleşmeli */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Üstteki 7 Gün Şekilleri */
        .days-container {
            position: absolute;
            top: 605px; /* Görseldeki pencere hizası */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .item-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .color-picker {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
        }

        .shape {
            width: 38px;
            height: 55px;
            border: 2px solid transparent;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transition: all 0.3s ease;
        }

        .label {
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
            color: transparent; /* Görselde zaten yazı var, sadece parlamayı ekleyeceğiz */
            transition: all 0.3s ease;
        }

        /* Dijital Saat Alanı */
        .clock-wrapper {
            position: absolute;
            top: 735px; /* Görseldeki 88:88 hizası */
            left: 50%;
            transform: translateX(-50%);
        }

        .digital-clock {
            font-family: 'Seven Segment', sans-serif;
            font-size: 110px;
            color: #1a1a1a; /* Sönük başlangıç */
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 5px;
        }

        /* Işık Efektleri */
        .active-glow .shape {
            border-color: currentColor;
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px currentColor, inset 0 0 10px currentColor;
        }
    </style>
</head>
<body>

    <div class="main-panel">
        
        <div class="days-container">
            <script>
                const gunler = ["PTS", "SAL", "ÇAR", "PER", "CUM", "CTS", "PAZ"];
                for (let i = 0; i < 7; i++) {
                    document.write(`
                        <div class="item-container">
                            <input type="color" class="color-picker" oninput="updateItem(this)">
                            <div class="shape"></div>
                            <div class="label">${gunler[i]}</div>
                        </div>
                    `);
                }
            </script>
        </div>

        <div class="clock-wrapper">
            <input type="color" class="color-picker" oninput="updateClock(this.value)">
            <div id="mainClock" class="digital-clock">00:00</div>
        </div>

    </div>

    <script>
        function updateItem(picker) {
            const color = picker.value;
            const container = picker.parentElement;
            const shape = container.querySelector('.shape');
            const label = container.querySelector('.label');

            shape.style.borderColor = color;
            shape.style.backgroundColor = color + "4D"; // %30 dolgu
            shape.style.boxShadow = `0 0 20px ${color}, inset 0 0 10px ${color}`;
            
            label.style.color = color;
            label.style.textShadow = `0 0 10px ${color}`;
        }

        function updateClock(color) {
            const clock = document.getElementById('mainClock');
            clock.style.color = color;
            clock.style.textShadow = `0 0 40px ${color}, 0 0 10px ${color}`;
        }

        function runClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('mainClock').innerText = `${hours}:${mins}`;
        }

        setInterval(runClock, 1000);
        runClock();
    </script>
</body>
</html>
