<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Panel</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/seven-segment');

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
        }

        /* Ana Panel: Ekranın genişliğine veya yüksekliğine göre kendini ayarlar */
        .main-panel {
            position: relative;
            width: 90vw; /* Ekran genişliğinin %90'ı */
            max-width: 800px; /* Ama 800px'i geçmesin */
            aspect-ratio: 1 / 1; /* Kare formunu korur (800/800) */
            background-image: url('g3086.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Günler Konteynırı: Yüzde ile konumlandırma */
        .days-container {
            position: absolute;
            top: 75.5%; /* 800px içinde 605px'e denk gelir */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.8%; /* Esnek boşluk */
            width: 48%; /* Pencerelerin yayıldığı toplam alan */
            justify-content: center;
        }

        .item-container {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .shape {
            width: 100%;
            aspect-ratio: 38 / 55; /* Çizdiğin pencere oranını korur */
            border: 2px solid transparent;
            border-top-left-radius: 1vw;
            border-top-right-radius: 1vw;
            transition: all 0.3s ease;
        }

        .label {
            font-size: 1.8vw; /* Mobilde küçülen yazı tipi */
            max-font-size: 14px;
            font-weight: bold;
            margin-top: 5%;
            color: transparent;
            white-space: nowrap;
        }

        /* Saat Alanı: Yüzde ile konumlandırma */
        .clock-wrapper {
            position: absolute;
            top: 91.5%; /* 800px içinde 735px civarı */
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            text-align: center;
        }

        .digital-clock {
            font-family: 'Seven Segment', sans-serif;
            font-size: 13vw; /* Ekran genişliğine göre büyür/küçülür */
            max-font-size: 110px;
            color: rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5vw;
            cursor: pointer;
        }

        .color-picker {
            position: absolute;
            top: 0; left: 0; opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer;
            z-index: 10;
        }

        /* Büyük ekranlar için yazı boyutunu sabitleme */
        @media (min-width: 800px) {
            .digital-clock { font-size: 110px; }
            .label { font-size: 14px; }
            .shape { border-top-left-radius: 20px; border-top-right-radius: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-panel">
        <div class="days-container">
            <script>
                const gunler = ["PTS", "SAL", "ÇAR", "PER", "CUM", "CTS", "PAZ"];
                gunler.forEach(gun => {
                    document.write(`
                        <div class="item-container">
                            <input type="color" class="color-picker" oninput="updateItem(this)">
                            <div class="shape"></div>
                            <div class="label">${gun}</div>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="clock-wrapper">
            <input type="color" class="color-picker" oninput="updateClock(this.value)">
            <div id="mainClock" class="digital-clock">00:00</div>
        </div>
    </div>

    <script>
        function updateItem(picker) {
            const color = picker.value;
            const container = picker.parentElement;
            const shape = container.querySelector('.shape');
            const label = container.querySelector('.label');

            shape.style.borderColor = color;
            shape.style.backgroundColor = color + "4D";
            shape.style.boxShadow = `0 0 1.5vw ${color}, inset 0 0 1vw ${color}`;
            label.style.color = color;
            label.style.textShadow = `0 0 1vw ${color}`;
        }

        function updateClock(color) {
            const clock = document.getElementById('mainClock');
            clock.style.color = color;
            clock.style.textShadow = `0 0 4vw ${color}, 0 0 1vw ${color}`;
        }

        function runClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('mainClock').innerText = `${hours}:${mins}`;
        }

        setInterval(runClock, 1000);
        runClock();
    </script>
</body>
</html>
